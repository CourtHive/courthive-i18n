name: ci

# Mirrors the structure of provider-config / courthive-components CI:
# install with pnpm, run the four gates, then build. The compare-keys
# step is the hard parity gate — any key drift across locales fails
# the build.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: lint + types + key parity + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        # pnpm version is resolved from package.json's `packageManager` field.
        # Specifying `version:` here too makes the action error out with
        # "Multiple versions of pnpm specified" (ERR_PNPM_BAD_PM_VERSION).
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check-types
      - name: Compare keys across locales (parity gate)
        run: node scripts/compare-keys.cjs
      - run: pnpm build
      - name: Sanity check generated manifest
        run: |
          test -f dist/manifest.json
          test -f dist/locale-labels.js
          node -e "const m = JSON.parse(require('fs').readFileSync('dist/manifest.json','utf8')); if (!m.locales.length) { console.error('empty manifest'); process.exit(1); }"
